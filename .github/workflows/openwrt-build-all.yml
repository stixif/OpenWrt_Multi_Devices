name: OpenWrt Multi Device Builder Stable and Pre

permissions:
  contents: write

on:

  workflow_dispatch:

  schedule:
    - cron: "0 4 * * 0"

env:

  REPO_URL: https://github.com/openwrt/openwrt.git
  # Repo_Branch dient nur für die infos
  REPO_BRANCH: openwrt-25.12
  TZ: Europe/Berlin

jobs:

  prepare:

    runs-on: ubuntu-latest

    outputs:
      build: ${{ steps.check.outputs.build }}
      #commit: ${{ steps.commit.outputs.commit }}

    steps:

      - name: Check OpenWrt commit
        id: check
        run: |

          #LATEST=$(git ls-remote $REPO_URL $REPO_BRANCH | cut -f1)
          LATEST=$(git ls-remote --heads $REPO_URL $REPO_BRANCH | awk '{print $1}')

          echo "Latest commit $LATEST"

          if git ls-remote --tags https://github.com/${{ github.repository }} | grep $LATEST
          then
            echo "No new commit -> skip build"
            echo "build=false" >> $GITHUB_OUTPUT
          else
            echo "New commit -> build"
            echo "build=true" >> $GITHUB_OUTPUT
          fi
          
          echo "commit=${LATEST:0:7}" >> $GITHUB_OUTPUT

  build:

    needs: prepare

    if: needs.prepare.outputs.build == 'true'

    runs-on: ubuntu-24.04

    strategy:

      fail-fast: false

      matrix:

        branch:
          - master
          - openwrt-25.12

        device:

          - name: Beryl_gl-mt3000
            config: configs/Beryl_gl-mt3000.config

          - name: Flint2_gl-mt6000
            config: configs/Flint2_gl-mt6000.config

          - name: Flint2_gl-mt6000-WAN
            config: configs/Flint2_gl-mt6000-WAN.config

    steps:

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |

          sudo apt update

          sudo apt install -y \
          build-essential clang flex bison g++ gawk gettext git \
          libncurses-dev libssl-dev python3 python3-venv \
          rsync unzip zlib1g-dev file wget jq ccache

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.ccache
            openwrt/dl
          key: ${{ matrix.device.name }}-${{ matrix.branch }}-${{ github.run_id }}
          restore-keys: |
            ${{ matrix.device.name }}-${{ matrix.branch }}

      - name: Clone OpenWrt
        run: |
          git clone --depth 1 --branch ${{ matrix.branch }} $REPO_URL openwrt
          cd openwrt
          echo "COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load device config
        run: |
          cp ${{ matrix.device.config }} openwrt/.config

      - name: Enable ccache
        run: |
          echo "CONFIG_CCACHE=y" >> openwrt/.config

      - name: Defconfig
        run: |
          cd openwrt
          make defconfig

      - name: Download sources
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: Build tools
        run: |
          cd openwrt
          make tools/install -j$(nproc)

      - name: Build toolchain
        run: |
          cd openwrt
          make toolchain/install -j$(nproc)

      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: Organize firmware
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "DIR=$PWD" >> $GITHUB_ENV
          echo "DATE=$(date +%F-%H%M)" >> $GITHUB_ENV
          cp version.buildinfo $GITHUB_WORKSPACE/version.buildinfo

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep OpenWrt version.buildinfo | awk '{print $2}')
          REVISION=$(grep OpenWrt version.buildinfo | awk '{print $3}')

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "revision=$REVISION" >> $GITHUB_OUTPUT

      - name: Changelog
        id: log
        run: |
          cd openwrt
 
          {
            echo "log<<CHANGELOG"
            git log -15 --pretty=format:"- %s (%h)"
            echo
            echo "CHANGELOG"
          } >> $GITHUB_OUTPUT

      - name: Determine release type
        run: |

          if [ "${{ matrix.branch }}" = "master" ]; then
            echo "PRERELEASE=true" >> $GITHUB_ENV
            echo "PREFIX=snapshot" >> $GITHUB_ENV
          else
            echo "PRERELEASE=false" >> $GITHUB_ENV
            echo "PREFIX=stable" >> $GITHUB_ENV
          fi
  
      - name: Release tag
        run: |

          echo "TAG=${PREFIX}-${{ matrix.device.name }}-${COMMIT}" >> $GITHUB_ENV
          echo "NAME=${PREFIX}-${{ matrix.device.name }}-${DATE}" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2

        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.NAME }}
          prerelease: ${{ env.PRERELEASE }}

          body: |

            Device: ${{ matrix.device.name }}
            Branch: ${{ matrix.branch }}
            Version: ${{ steps.version.outputs.version }}
            Revision: ${{ steps.version.outputs.revision }}
            Commit: ${{ env.COMMIT }}
            Build Date: ${{ env.DATE }}
            Recent OpenWrt Changes
            ${{ steps.log.outputs.log }}

          files: |
            ${{ env.DIR }}/*squashfs*.bin
            ${{ env.DIR }}/*.buildinfo
            ${{ env.DIR }}/*.manifest
            ${{ env.DIR }}/sha256sums

      - name: Cleanup old releases
        uses: dev-drprasad/delete-older-releases@v0.3.4

        with:
          keep_latest: 10
          delete_tags: true

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
